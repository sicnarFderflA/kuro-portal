<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>KURO · Research Portal Dashboard | Xavier University</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f4f7fc;
            color: #1a2e3f;
        }
        .dashboard-container { display: flex; flex-direction: column; min-height: 100vh; }
        .top-nav {
            background: white;
            box-shadow: 0 2px 12px rgba(0,0,0,0.05);
            padding: 0.8rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            border-bottom: 2px solid #e9eef3;
        }
        .logo-area h2 { font-size: 1.5rem; color: #1b4d2e; display: flex; align-items: center; gap: 0.5rem; }
        .user-info { display: flex; align-items: center; gap: 1rem; }
        .avatar { width: 42px; height: 42px; border-radius: 50%; background: #1b4d2e; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .role-badge { background: #eef2fa; padding: 0.3rem 0.9rem; border-radius: 40px; font-size: 0.75rem; font-weight: 600; }
        .role-badge.reviewer-mode { background: #e6f0ea; color: #1b4d2e; }
        .logout-nav { background: #fff0df; color: #a5530e; border: none; padding: 0.4rem 1rem; border-radius: 30px; cursor: pointer; font-weight: 600; }
        .switch-reviewer-btn {
            background: #1b4d2e20; color: #1b4d2e; border: 1px solid #1b4d2e40;
            padding: 0.4rem 1rem; border-radius: 30px; cursor: pointer; font-weight: 500; font-size: 0.75rem;
        }
        .switch-reviewer-btn.active { background: #1b4d2e; color: white; }
        .role-switch-bar {
            background: #f8faf5;
            padding: 0.6rem 2rem;
            border-bottom: 1px solid #e2ecd9;
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        .role-switch-btn {
            background: #f0f2f5;
            border: none;
            padding: 0.4rem 1rem;
            border-radius: 30px;
            font-size: 0.75rem;
            cursor: pointer;
            font-weight: 500;
        }
        .role-switch-btn.active { background: #1b4d2e; color: white; }
        .main-content { padding: 2rem; max-width: 1400px; margin: 0 auto; width: 100%; }
        .dashboard-title { margin-bottom: 1.5rem; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .stat-card { background: white; border-radius: 1.5rem; padding: 1.2rem; box-shadow: 0 4px 10px rgba(0,0,0,0.02); border: 1px solid #eef2f0; }
        .grants-table { width: 100%; background: white; border-radius: 1.5rem; border-collapse: collapse; overflow: hidden; }
        .grants-table th, .grants-table td { padding: 1rem; text-align: left; border-bottom: 1px solid #ecf3e8; }
        .status { padding: 0.2rem 0.7rem; border-radius: 40px; font-size: 0.7rem; font-weight: 600; display: inline-block; }
        .status.pending { background: #fff0db; color: #b45f1b; }
        .status.approved { background: #e0f5e6; color: #1e6f3f; }
        .status.review { background: #e3ecff; color: #2c5f9a; }
        .btn-sm { background: #eef2fa; border: none; padding: 0.3rem 1rem; border-radius: 30px; cursor: pointer; font-size: 0.75rem; margin: 0.2rem; }
        .btn-primary { background: #1b4d2e; color: white; border: none; padding: 0.5rem 1.2rem; border-radius: 40px; cursor: pointer; font-weight: 500; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; gap: 1rem; }
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
            display: flex; align-items: center; justify-content: center;
            z-index: 2000; visibility: hidden; opacity: 0;
            transition: 0.2s;
        }
        .modal-overlay.active { visibility: visible; opacity: 1; }
        .modal-container {
            background: white; border-radius: 2rem; max-width: 700px; width: 90%;
            max-height: 85vh; overflow-y: auto; padding: 1.8rem;
            box-shadow: 0 20px 35px rgba(0,0,0,0.2);
        }
        .modal-header { display: flex; justify-content: space-between; margin-bottom: 1.2rem; font-weight: 700; font-size: 1.3rem; }
        .close-modal { background: none; border: none; font-size: 1.5rem; cursor: pointer; }
        .grant-tile {
            background: #f9fbf7; border: 1px solid #e2ecd9; border-radius: 1rem;
            padding: 1rem; margin-bottom: 0.8rem; cursor: pointer; transition: 0.1s;
            display: flex; justify-content: space-between; align-items: center;
        }
        .grant-tile:hover { background: #f1f7ec; transform: translateX(4px); }
        .grant-category { font-size: 0.7rem; color: #6f8f7a; margin-top: 0.2rem; }
        .application-detail { background: #fefcf5; padding: 1rem; border-radius: 1rem; margin-bottom: 1rem; border-left: 4px solid #d4af37; }
        .input-field { padding: 0.6rem; border-radius: 40px; border: 1px solid #cddfc7; width: 100%; margin-bottom: 0.8rem; }
        .demo-note { font-size: 0.68rem; background: #f3f7ef; padding: 0.6rem; border-radius: 28px; margin-top: 1.5rem; text-align: center; }
        @media (max-width: 700px) { .top-nav { flex-direction: column; gap: 0.8rem; } }
    </style>
</head>
<body>
<div class="dashboard-container" id="dashboardApp">
    <div class="top-nav">
        <div class="logo-area"><h2><i class="fas fa-scroll" style="color:#d4af37;"></i> KURO · Research Office</h2><div style="font-size:0.7rem;">Xavier University</div></div>
        <div class="user-info">
            <div class="avatar" id="userAvatarSide">XR</div>
            <div><div id="userNameSide" style="font-weight:600;"></div><div id="userEmailSide" style="font-size:0.7rem;"></div></div>
            <div class="role-badge" id="roleBadge"></div>
            <button id="switchReviewerModeBtn" class="switch-reviewer-btn" style="display: none;"><i class="fas fa-user-check"></i> Switch to Reviewer</button>
            <button id="logoutMainBtn" class="logout-nav"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>
    </div>
    <div class="role-switch-bar">
        <span style="font-size:0.7rem; font-weight:600;">VIEW AS:</span>
        <button class="role-switch-btn" data-role="applicant">📄 Applicant</button>
        <button class="role-switch-btn" data-role="admin">⚙️ Admin/KURO</button>
        <button class="role-switch-btn" data-role="reviewer">🔍 External Reviewer</button>
        <span style="font-size:0.65rem; margin-left: auto;"><i class="fas fa-gavel"></i> Role-based grants portal</span>
    </div>
    <div class="main-content" id="dynamicDashboard"></div>
</div>

<div id="globalModal" class="modal-overlay"><div class="modal-container"><div class="modal-header"><span id="modalTitle"></span><button class="close-modal" id="closeModalBtn">&times;</button></div><div id="modalBody"></div></div></div>

<script>
    // ==================== ROLE & DOMAIN-BASED GRANTS VISIBILITY ====================
    // Domain rules:
    // @my.xu.edu.ph = STUDENT -> can only apply for Kinaadman Student Research Award (KSRA)
    // @xu.edu.ph = FACULTY -> can apply for Faculty Research Grants (IR, MBHR, MR, MRR) + Publication Award + Madigan Award (NO KSRA)
    // Faculty can also be external reviewers (additional button)
    
    const FACULTY_GRANTS = [
        "INSTITUTIONAL RESEARCH (IR) AWARD",
        "MIGUEL BERNAD HUMANITIES RESEARCH (MBHR) AWARD",
        "MINDANAO RESEARCH (MR) AWARD",
        "MATTEO RICCI RESEARCH (MRR) AWARD",
        "Publication Award",
        "Madigan Award"
    ];
    const STUDENT_GRANTS = ["Kinaadman Student Research Award (KSRA)"];
    const ALL_GRANTS_BY_ROLE = { faculty: FACULTY_GRANTS, student: STUDENT_GRANTS };
    
    const GRANTS_CATALOG = {
        "Faculty Research Grants": [
            { name: "INSTITUTIONAL RESEARCH (IR) AWARD", category: "Faculty Research", deadline: "May 30, 2025", description: "Supports faculty-led research initiatives at Xavier University." },
            { name: "MIGUEL BERNAD HUMANITIES RESEARCH (MBHR) AWARD", category: "Faculty Research", deadline: "June 15, 2025", description: "For outstanding humanities research projects." },
            { name: "MINDANAO RESEARCH (MR) AWARD", category: "Faculty Research", deadline: "July 10, 2025", description: "Focuses on Mindanao-based studies and development." },
            { name: "MATTEO RICCI RESEARCH (MRR) AWARD", category: "Faculty Research", deadline: "August 5, 2025", description: "Interdisciplinary research with cross-cultural dialogue." }
        ],
        "Publication Award": [
            { name: "Publication Award", category: "Award", deadline: "September 1, 2025", description: "Recognizes outstanding scholarly publications by Xavier faculty and researchers." }
        ],
        "Madigan Award": [
            { name: "Madigan Award", category: "Award", deadline: "September 15, 2025", description: "Prestigious award for excellence in research and academic contribution." }
        ],
        "Student Research Award": [
            { name: "Kinaadman Student Research Award (KSRA)", category: "Student Research", deadline: "October 20, 2025", description: "Supports undergraduate and graduate student research projects." }
        ]
    };
    
    // Helper: determine user type from email
    function getUserType(email) {
        if (!email) return "student";
        const domain = email.split('@')[1]?.toLowerCase();
        if (domain === "my.xu.edu.ph") return "student";
        if (domain === "xu.edu.ph") return "faculty";
        return "student"; // fallback
    }
    
    // Get available grants for current user
    function getAvailableGrantsForUser(email) {
        const userType = getUserType(email);
        if (userType === "faculty") return FACULTY_GRANTS;
        return STUDENT_GRANTS;
    }
    
    // Mock databases
    let submissionsDB = JSON.parse(localStorage.getItem('kuro_submissions')) || {
        "maria.santos@xu.edu.ph": [
            { id: "SUB001", grantTitle: "INSTITUTIONAL RESEARCH (IR) AWARD", status: "Under Review", submittedDate: "2025-03-10", abstract: "Digital transformation in higher education.", projectTitle: "AI in Philippine HEIs" },
            { id: "SUB002", grantTitle: "Publication Award", status: "Approved", submittedDate: "2025-02-18", abstract: "Publication excellence in social sciences.", projectTitle: "Decolonizing Research Methods" }
        ],
        "jose.ramirez@my.xu.edu.ph": [
            { id: "SUB003", grantTitle: "Kinaadman Student Research Award (KSRA)", status: "External Review", submittedDate: "2025-03-01", abstract: "Indigenous knowledge systems in Mindanao.", projectTitle: "Lumad Epistemologies" }
        ],
        "carla.uy@xu.edu.ph": [
            { id: "SUB004", grantTitle: "Madigan Award", status: "Under Review", submittedDate: "2025-03-15", abstract: "Excellence in renewable energy research.", projectTitle: "Solar Microgrids for Rural Communities" }
        ]
    };
    
    let allApplications = [];
    function rebuildAllApps() {
        allApplications = [];
        for (const [email, apps] of Object.entries(submissionsDB)) {
            apps.forEach(app => { allApplications.push({ ...app, applicantEmail: email }); });
        }
    }
    rebuildAllApps();
    
    let reviewerAssignments = JSON.parse(localStorage.getItem('kuro_reviewer_tasks')) || {
        "reviewer1@example.com": [
            { id: "SUB001", grantTitle: "INSTITUTIONAL RESEARCH (IR) AWARD", applicant: "maria.santos@xu.edu.ph", status: "pending_review", dueDate: "2025-04-15" }
        ]
    };
    
    let currentUser = null;
    let activeRole = "applicant";
    let isReviewerModeActive = false; // for faculty switching to reviewer mode
    let modal = document.getElementById('globalModal');
    function closeModal() { modal.classList.remove('active'); }
    document.getElementById('closeModalBtn').onclick = closeModal;
    modal.onclick = (e) => { if(e.target === modal) closeModal(); };
    
    function persistData() { 
        localStorage.setItem('kuro_submissions', JSON.stringify(submissionsDB)); 
        rebuildAllApps(); 
        localStorage.setItem('kuro_reviewer_tasks', JSON.stringify(reviewerAssignments)); 
    }
    
    // ========== APPLICANT DASHBOARD (Domain-Restricted Grants) ==========
    function renderApplicantDashboard() {
        const userEmail = currentUser.email;
        const userType = getUserType(userEmail);
        const availableGrants = getAvailableGrantsForUser(userEmail);
        const mySubmissions = (submissionsDB[userEmail] || []).filter(sub => availableGrants.includes(sub.grantTitle));
        
        const stats = { 
            pending: mySubmissions.filter(s => s.status === "Under Review" || s.status === "External Review").length, 
            approved: mySubmissions.filter(s => s.status === "Approved").length, 
            totalAvailable: availableGrants.length 
        };
        
        let typeLabel = userType === "faculty" ? "Faculty Researcher" : "Student Researcher";
        let restrictionNote = userType === "faculty" 
            ? "You can apply for Faculty Research Grants, Publication Award, and Madigan Award." 
            : "You can apply for the Kinaadman Student Research Award (KSRA).";
        
        let html = `
            <div class="dashboard-title"><h2><i class="fas fa-file-alt"></i> My Grant & Award Applications</h2><p>${typeLabel} · ${restrictionNote}</p></div>
            <div class="stats-grid">
                <div class="stat-card"><i class="fas fa-hourglass-half"></i> <h3>${stats.pending}</h3> <span>Under Review</span></div>
                <div class="stat-card"><i class="fas fa-check-circle"></i> <h3>${stats.approved}</h3> <span>Approved / Awarded</span></div>
                <div class="stat-card"><i class="fas fa-trophy"></i> <h3>${stats.totalAvailable}</h3> <span>Available for You</span></div>
            </div>
            <div class="flex-between"><h3>My Submissions</h3><button class="btn-primary" id="applicantNewGrantBtn"><i class="fas fa-plus"></i> New Application</button></div>
            <table class="grants-table"><thead><tr><th>Grant / Award Title</th><th>Submitted</th><th>Status</th><th>Action</th></tr></thead><tbody>`;
        if (mySubmissions.length === 0) html += `<tr><td colspan="4">No applications yet. Click "New Application" to start.${userType === "student" ? " You may only apply for KSRA." : ""}</td></tr>`;
        mySubmissions.forEach(sub => {
            let statusClass = sub.status === 'Approved' ? 'approved' : (sub.status === 'Under Review' ? 'pending' : 'review');
            html += `<tr>
                <td><strong>${sub.grantTitle}</strong></td>
                <td>${sub.submittedDate}</td>
                <td><span class="status ${statusClass}">${sub.status}</span></td>
                <td><button class="btn-sm view-submission" data-id="${sub.id}">View Details</button></td>
            </tr>`;
        });
        html += `</tbody></table>
        <div class="demo-note"><i class="fas fa-info-circle"></i> <strong>KURO Grants & Awards:</strong> ${userType === "faculty" ? "Faculty Research Grants (IR, MBHR, MR, MRR) | Publication Award | Madigan Award" : "Kinaadman Student Research Award (KSRA) for undergraduate and graduate students."}<br>For guidelines, contact the Kinaadman University Research Office.</div>`;
        dynamicDiv.innerHTML = html;
        document.getElementById('applicantNewGrantBtn')?.addEventListener('click', () => openGrantSelectionModal());
        document.querySelectorAll('.view-submission').forEach(btn => btn.addEventListener('click', (e) => {
            const id = btn.getAttribute('data-id');
            const sub = mySubmissions.find(s => s.id === id);
            if(sub) showSubmissionDetails(sub);
        }));
    }
    
    function openGrantSelectionModal() {
        const userEmail = currentUser.email;
        const availableGrants = getAvailableGrantsForUser(userEmail);
        document.getElementById('modalTitle').innerHTML = '<i class="fas fa-scroll"></i> Select a Grant or Award';
        let grantsHtml = `<p style="margin-bottom:1rem; color:#4a6b58;">Choose the research funding opportunity you are eligible to apply for:</p>`;
        
        for (const [category, items] of Object.entries(GRANTS_CATALOG)) {
            const eligibleItems = items.filter(g => availableGrants.includes(g.name));
            if (eligibleItems.length === 0) continue;
            grantsHtml += `<div style="margin-top:1.2rem; margin-bottom:0.5rem;"><strong><i class="fas fa-tag"></i> ${category}</strong></div>`;
            eligibleItems.forEach(g => {
                grantsHtml += `<div class="grant-tile" data-grant="${g.name}">
                    <div>
                        <strong>${g.name}</strong>
                        <div class="grant-category"><i class="far fa-calendar-alt"></i> Deadline: ${g.deadline} · ${g.category}</div>
                        <div style="font-size:0.7rem; color:#7c9a87; margin-top:4px;">${g.description.substring(0, 100)}</div>
                    </div>
                    <i class="fas fa-chevron-right" style="color:#1b4d2e;"></i>
                </div>`;
            });
        }
        document.getElementById('modalBody').innerHTML = grantsHtml;
        modal.classList.add('active');
        document.querySelectorAll('.grant-tile').forEach(tile => {
            tile.addEventListener('click', () => {
                const grantName = tile.getAttribute('data-grant');
                closeModal();
                showProposalForm(grantName);
            });
        });
    }
    
    function showProposalForm(grantTitle) {
        document.getElementById('modalTitle').innerHTML = `<i class="fas fa-file-signature"></i> Apply for: ${grantTitle}`;
        document.getElementById('modalBody').innerHTML = `
            <form id="proposalForm">
                <label style="font-weight:600;">Project Title</label>
                <input type="text" id="projTitle" class="input-field" placeholder="e.g., Advancing Sustainable Agriculture" required>
                <label style="font-weight:600;">Abstract / Research Summary</label>
                <textarea id="abstract" rows="4" class="input-field" placeholder="Brief description of your research objectives, methodology, and expected outcomes..."></textarea>
                <label style="font-weight:600;">Budget Estimate (PHP)</label>
                <input type="text" id="budget" class="input-field" placeholder="e.g., 250,000">
                <button type="submit" class="btn-primary" style="width:100%;"><i class="fas fa-paper-plane"></i> Submit Proposal</button>
            </form>
        `;
        modal.classList.add('active');
        document.getElementById('proposalForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const title = document.getElementById('projTitle').value;
            const abstract = document.getElementById('abstract').value;
            if(!title) { alert("Please provide a project title"); return; }
            const newId = "SUB" + Date.now();
            const newSubmission = { 
                id: newId, grantTitle: grantTitle, status: "Under Review", 
                submittedDate: new Date().toISOString().slice(0,10), 
                abstract: abstract || "No abstract provided.",
                projectTitle: title, budget: document.getElementById('budget').value || "Not specified"
            };
            if(!submissionsDB[currentUser.email]) submissionsDB[currentUser.email] = [];
            submissionsDB[currentUser.email].push(newSubmission);
            persistData();
            closeModal();
            renderApplicantDashboard();
            alert(`✅ Your proposal for "${grantTitle}" has been submitted to KURO.`);
        });
    }
    
    function showSubmissionDetails(sub) {
        document.getElementById('modalTitle').innerHTML = `<i class="fas fa-info-circle"></i> Application Details`;
        document.getElementById('modalBody').innerHTML = `
            <div class="application-detail">
                <strong>Grant/Award:</strong> ${sub.grantTitle}<br>
                <strong>Project Title:</strong> ${sub.projectTitle || sub.grantTitle}<br>
                <strong>Submission ID:</strong> ${sub.id}<br>
                <strong>Date Submitted:</strong> ${sub.submittedDate}<br>
                <strong>Status:</strong> <span class="status ${sub.status === 'Approved' ? 'approved' : 'pending'}">${sub.status}</span><br>
                <strong>Abstract:</strong> ${sub.abstract || "No abstract provided."}<br>
                ${sub.budget ? `<strong>Budget Estimate:</strong> ₱${sub.budget}<br>` : ''}
            </div>
            <button class="btn-sm" id="closeDetailModal">Close</button>
        `;
        modal.classList.add('active');
        document.getElementById('closeDetailModal')?.addEventListener('click', closeModal);
    }
    
    // ========== ADMIN DASHBOARD (unchanged, sees all) ==========
    function renderAdminDashboard() {
        let html = `<div class="dashboard-title"><h2><i class="fas fa-chalkboard-user"></i> KURO Administrator Dashboard</h2><p>Manage all grants, review applications, assign external reviewers</p></div>
        <div class="stats-grid">
            <div class="stat-card"><i class="fas fa-trophy"></i> <h3>${FACULTY_GRANTS.length + STUDENT_GRANTS.length}</h3><span>Total Grants/Awards</span></div>
            <div class="stat-card"><i class="fas fa-file-alt"></i> <h3>${allApplications.length}</h3><span>Total Submissions</span></div>
            <div class="stat-card"><i class="fas fa-users"></i> <h3>${Object.keys(reviewerAssignments).length}</h3><span>Active Reviewers</span></div>
        </div>
        <h3><i class="fas fa-list-ul"></i> All Research Grants & Awards</h3>
        <div id="adminGrantsList"></div>`;
        dynamicDiv.innerHTML = html;
        const container = document.getElementById('adminGrantsList');
        container.innerHTML = '';
        const allGrants = [...FACULTY_GRANTS, ...STUDENT_GRANTS];
        for (let grant of allGrants) {
            const appsForGrant = allApplications.filter(app => app.grantTitle === grant);
            const grantDiv = document.createElement('div');
            grantDiv.className = "grant-tile";
            grantDiv.innerHTML = `<div><strong>${grant}</strong><div class="grant-category">${appsForGrant.length} application(s)</div></div><i class="fas fa-chevron-right"></i>`;
            grantDiv.addEventListener('click', () => showAdminGrantApplications(grant));
            container.appendChild(grantDiv);
        }
    }
    
    function showAdminGrantApplications(grantTitle) {
        const applications = allApplications.filter(app => app.grantTitle === grantTitle);
        document.getElementById('modalTitle').innerHTML = `<i class="fas fa-folder-open"></i> Applications for ${grantTitle}`;
        let bodyHtml = applications.length === 0 ? "<p>No submissions yet.</p>" : "";
        applications.forEach(app => {
            bodyHtml += `<div class="application-detail">
                <strong>Applicant:</strong> ${app.applicantEmail}<br>
                <strong>Project:</strong> ${app.projectTitle || app.grantTitle}<br>
                <strong>Status:</strong> <span class="status ${app.status === 'Approved' ? 'approved' : 'pending'}">${app.status}</span><br>
                <div style="margin-top:0.5rem;">
                    <button class="btn-sm review-app-admin" data-id="${app.id}">Update Status</button>
                    <button class="btn-sm assign-reviewer-admin" data-id="${app.id}" data-grant="${grantTitle}">Assign Reviewer</button>
                </div>
            </div>`;
        });
        document.getElementById('modalBody').innerHTML = bodyHtml;
        modal.classList.add('active');
        document.querySelectorAll('.review-app-admin').forEach(btn => btn.addEventListener('click', (e) => {
            updateApplicationStatus(btn.getAttribute('data-id'));
        }));
        document.querySelectorAll('.assign-reviewer-admin').forEach(btn => btn.addEventListener('click', (e) => {
            promptAssignReviewer(btn.getAttribute('data-id'), btn.getAttribute('data-grant'));
        }));
    }
    
    function updateApplicationStatus(appId) {
        for(let [email, apps] of Object.entries(submissionsDB)) {
            const app = apps.find(a => a.id === appId);
            if(app) {
                const newStatus = prompt(`Current: ${app.status}\nNew status (Under Review / External Review / Approved):`, app.status);
                if(newStatus && ["Under Review","External Review","Approved"].includes(newStatus)) {
                    app.status = newStatus;
                    persistData();
                    alert(`Status updated to ${newStatus}`);
                    closeModal();
                    renderAdminDashboard();
                }
                return;
            }
        }
    }
    
    function promptAssignReviewer(appId, grantTitle) {
        const reviewerEmail = prompt("Enter external reviewer email:");
        if(reviewerEmail && reviewerEmail.includes('@')) {
            if(!reviewerAssignments[reviewerEmail]) reviewerAssignments[reviewerEmail] = [];
            reviewerAssignments[reviewerEmail].push({ id: appId, grantTitle: grantTitle, dueDate: new Date(Date.now()+14*86400000).toISOString().slice(0,10) });
            persistData();
            alert(`Reviewer ${reviewerEmail} assigned.`);
            closeModal();
        }
    }
    
    // ========== EXTERNAL REVIEWER DASHBOARD ==========
    function renderReviewerDashboard() {
        const reviewerEmail = currentUser.email;
        const myTasks = reviewerAssignments[reviewerEmail] || [];
        let html = `<div class="dashboard-title"><h2><i class="fas fa-star-of-life"></i> External Reviewer Dashboard</h2><p>Evaluate assigned proposals</p></div>
        <div class="stats-grid"><div class="stat-card"><i class="fas fa-clipboard-list"></i><h3>${myTasks.length}</h3><span>Assigned Reviews</span></div></div>`;
        if(myTasks.length === 0) html += `<div class="demo-note">No pending review invitations.</div>`;
        else {
            html += `<table class="grants-table"><thead><tr><th>Grant/Award</th><th>Proposal ID</th><th>Due Date</th><th>Action</th></tr></thead><tbody>`;
            myTasks.forEach(task => {
                html += `<tr><td>${task.grantTitle}</td><td>${task.id}</td><td>${task.dueDate}</td><td><button class="btn-sm review-task" data-id="${task.id}">Review</button></td></tr>`;
            });
            html += `</tbody></table>`;
        }
        dynamicDiv.innerHTML = html;
        document.querySelectorAll('.review-task').forEach(btn => btn.addEventListener('click', (e) => {
            showReviewerForm(btn.getAttribute('data-id'));
        }));
    }
    
    function showReviewerForm(proposalId) {
        let proposal = null;
        for(let [email, apps] of Object.entries(submissionsDB)) {
            const p = apps.find(a => a.id === proposalId);
            if(p) { proposal = p; break; }
        }
        if(!proposal) return;
        document.getElementById('modalTitle').innerHTML = `Review: ${proposal.grantTitle}`;
        document.getElementById('modalBody').innerHTML = `
            <div class="application-detail"><strong>Project:</strong> ${proposal.projectTitle}<br><strong>Abstract:</strong> ${proposal.abstract}</div>
            <form id="reviewForm">
                <label>Score (1-10):</label><select id="score" class="input-field"><option>10</option><option>9</option><option>8</option><option>7</option><option>6</option></select>
                <label>Comments:</label><textarea id="comments" rows="3" class="input-field"></textarea>
                <label>Recommendation:</label><select id="recommendation" class="input-field"><option>Approve</option><option>Revisions</option><option>Reject</option></select>
                <button type="submit" class="btn-primary">Submit Review</button>
            </form>
        `;
        modal.classList.add('active');
        document.getElementById('reviewForm').addEventListener('submit', (e) => {
            e.preventDefault();
            alert(`Review submitted for ${proposalId}. Thank you.`);
            const reviewerEmail = currentUser.email;
            if(reviewerAssignments[reviewerEmail]) {
                reviewerAssignments[reviewerEmail] = reviewerAssignments[reviewerEmail].filter(t => t.id !== proposalId);
                persistData();
            }
            closeModal();
            renderReviewerDashboard();
        });
    }
    
    // ========== FACULTY REVIEWER MODE TOGGLE ==========
    function toggleReviewerMode() {
        const userType = getUserType(currentUser.email);
        if (userType !== "faculty") return;
        isReviewerModeActive = !isReviewerModeActive;
        const btn = document.getElementById('switchReviewerModeBtn');
        if (isReviewerModeActive) {
            btn.innerHTML = '<i class="fas fa-user-graduate"></i> Switch to Applicant';
            btn.classList.add('active');
            // Show reviewer dashboard but keep applicant context? Actually switch role temporarily
            activeRole = "reviewer";
            renderDashboard();
            document.querySelector(`.role-switch-btn[data-role="reviewer"]`).classList.add('active');
            document.querySelector(`.role-switch-btn[data-role="applicant"]`).classList.remove('active');
        } else {
            btn.innerHTML = '<i class="fas fa-user-check"></i> Switch to Reviewer';
            btn.classList.remove('active');
            activeRole = "applicant";
            renderDashboard();
            document.querySelector(`.role-switch-btn[data-role="applicant"]`).classList.add('active');
            document.querySelector(`.role-switch-btn[data-role="reviewer"]`).classList.remove('active');
        }
        saveRoleToSession();
    }
    
    // ========== COMMON ==========
    const dynamicDiv = document.getElementById('dynamicDashboard');
    function renderDashboard() {
        if(!currentUser) return;
        updateTopBar();
        if(activeRole === "applicant") renderApplicantDashboard();
        else if(activeRole === "admin") renderAdminDashboard();
        else renderReviewerDashboard();
    }
    
    function updateTopBar() {
        document.getElementById('userNameSide').innerText = currentUser.name || 'Xavier User';
        document.getElementById('userEmailSide').innerText = currentUser.email;
        document.getElementById('userAvatarSide').innerText = (currentUser.name?.charAt(0) || 'XU').toUpperCase();
        let roleLabel = activeRole === "applicant" ? "Grant Applicant" : (activeRole === "admin" ? "KURO Administrator" : "External Reviewer");
        document.getElementById('roleBadge').innerText = roleLabel;
        const userType = getUserType(currentUser.email);
        const switchBtn = document.getElementById('switchReviewerModeBtn');
        if (userType === "faculty" && activeRole !== "admin") {
            switchBtn.style.display = 'inline-block';
            if (isReviewerModeActive) switchBtn.innerHTML = '<i class="fas fa-user-graduate"></i> Switch to Applicant';
            else switchBtn.innerHTML = '<i class="fas fa-user-check"></i> Switch to Reviewer';
        } else {
            switchBtn.style.display = 'none';
        }
    }
    
    function saveRoleToSession() { sessionStorage.setItem('kuro_role', activeRole); }
    function bindRoleSwitchers() {
        document.querySelectorAll('.role-switch-btn').forEach(btn => {
            btn.onclick = () => {
                if (btn.getAttribute('data-role') === "reviewer" && getUserType(currentUser.email) === "student") {
                    alert("Student accounts cannot access External Reviewer mode. Only faculty can be reviewers.");
                    return;
                }
                activeRole = btn.getAttribute('data-role');
                if (activeRole !== "reviewer") isReviewerModeActive = false;
                saveRoleToSession();
                renderDashboard();
                document.querySelectorAll('.role-switch-btn').forEach(b=>b.classList.remove('active'));
                btn.classList.add('active');
            };
        });
    }
    
    function loadSession() {
        const userData = sessionStorage.getItem('kuro_user');
        if(!userData) { window.location.href = "login.html"; return; }
        try {
            currentUser = JSON.parse(userData);
            if (!currentUser.email) throw new Error();
            const savedRole = sessionStorage.getItem('kuro_role');
            if(savedRole && ["applicant","admin","reviewer"].includes(savedRole)) activeRole = savedRole;
            else activeRole = "applicant";
            if (activeRole === "reviewer" && getUserType(currentUser.email) !== "faculty") activeRole = "applicant";
            updateTopBar(); renderDashboard(); bindRoleSwitchers();
            document.querySelector(`.role-switch-btn[data-role="${activeRole}"]`)?.classList.add('active');
        } catch(e) { window.location.href = "login.html"; }
    }
    
    document.getElementById('logoutMainBtn').onclick = () => { sessionStorage.clear(); window.location.href = "login.html"; };
    document.getElementById('switchReviewerModeBtn').onclick = toggleReviewerMode;
    loadSession();
</script>
</body>
</html>
